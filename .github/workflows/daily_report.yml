name: Doog Intelligent Market — Rapport quotidien

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Récupère le code
        uses: actions/checkout@v3

      - name: Configure Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installe les dépendances
        run: pip install requests feedparser python-dotenv pyyaml jinja2 groq

      - name: Crée le fichier .env
        run: echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env

      - name: Initialise la base de données
        run: python3 database/init_db.py

      - name: Collecte Napoléon 20F
        run: python3 collectors/collect_napoleon.py

      - name: Collecte actions (stocks)
        run: python3 collectors/collect_stocks.py

      - name: Génère le rapport
        run: python3 main.py --no-browser

      - name: Crée le dossier de publication et index.html
        run: |
          mkdir -p public
          cp rapport_*.html public/
          RAPPORT=$(ls rapport_*.html | head -1)
          cat > public/index.html << HTML
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=${RAPPORT}">
            <title>Doog Intelligent Market</title>
          </head>
          <body>
            <p>Chargement du rapport... <a href="${RAPPORT}">Cliquez ici</a></p>
          </body>
          </html>
          HTML

      - name: Publie sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public
          publish_branch: gh-pages

      - name: Notification NTFY
        run: |
          DATE=$(date '+%d/%m/%Y')
          curl -X POST \
            -H "Title: 📊 Doog Intelligent Market — $DATE" \
            -H "Priority: default" \
            -H "Click: https://doog-code.github.io/doog-intelligent-market/" \
            -H "Tags: chart_with_upwards_trend" \
            -d "Rapport du $DATE disponible — marchés, analyses et opportunités" \
            https://ntfy.sh/${{ secrets.NTFY_TOPIC }}
